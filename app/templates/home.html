{% extends "base.html" %}

{% block title %}WeatherStation — Tutte le Stazioni{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
    <h4 class="mb-0">
        <i class="bi bi-cloud-sun-fill me-2" style="color: var(--ws-accent)"></i>Stazioni Meteo
    </h4>
    <div class="d-flex align-items-center gap-3">
        <div class="input-group input-group-sm" style="max-width: 250px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="stationSearch"
                   placeholder="Cerca stazione...">
        </div>
        <button class="btn btn-sm btn-outline-primary" id="btnRefresh">
            <i class="bi bi-arrow-clockwise me-1"></i>Aggiorna
        </button>
        <small style="color: var(--ws-text-secondary)">
            <i class="bi bi-clock me-1"></i><span id="lastUpdate" class="fw-semibold">--</span>
        </small>
    </div>
</div>

<div id="stationsGrid" class="row g-3">
    <div class="ws-loading">
        <div class="spinner-border spinner-border-sm"></div>
        <span>Caricamento stazioni...</span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    window.WS_HOME_AUTO_REFRESH = {{ homepage_auto_refresh | tojson }};
    window.WS_HOME_REFRESH_MS = {{ homepage_refresh_minutes }} * 60 * 1000;
</script>
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
