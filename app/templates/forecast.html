{% extends "base.html" %}

{% block title %}Previsioni | WeatherStation{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
    <h4 class="mb-0">
        <i class="bi bi-cloud-sun me-2" style="color: var(--ws-accent)"></i>Previsioni 5 Giorni
    </h4>
    <button class="btn btn-sm btn-outline-primary" id="btnRefresh">
        <i class="bi bi-arrow-clockwise me-1"></i>Aggiorna
    </button>
</div>

<div id="forecastGrid" class="row g-3">
    <div class="ws-loading">
        <div class="spinner-border spinner-border-sm"></div>
        <span>Caricamento previsioni...</span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/forecast.js') }}"></script>
{% endblock %}
