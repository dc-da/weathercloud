<!DOCTYPE html>
<html lang="it" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WeatherStation{% endblock %}</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- DataTables CSS (Bootstrap 5 theme) -->
    <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

    <style>
        :root {
            --ws-primary: #0d6efd;
            --ws-success: #198754;
            --ws-warning: #ffc107;
            --ws-danger: #dc3545;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .navbar-brand i {
            font-size: 1.4rem;
        }

        .metric-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }

        .metric-card .metric-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .metric-card .metric-unit {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .metric-card .metric-icon {
            font-size: 1.6rem;
            opacity: 0.6;
        }

        .theme-toggle {
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-dot.connected    { background-color: var(--ws-success); }
        .status-dot.disconnected { background-color: var(--ws-danger); }
        .status-dot.loading      { background-color: var(--ws-warning); }

        /* Fix DataTables in dark mode */
        [data-bs-theme="dark"] .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: #dee2e6 !important;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top bg-body-tertiary border-bottom shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="bi bi-cloud-sun-fill text-primary me-1"></i>
                WeatherStation
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}"
                           href="/dashboard">
                            <i class="bi bi-speedometer2 me-1"></i>Istantanea
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/daily' %}active{% endif %}"
                           href="/daily">
                            <i class="bi bi-calendar-day me-1"></i>Giornaliera
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/historical' %}active{% endif %}"
                           href="/historical">
                            <i class="bi bi-clock-history me-1"></i>Storica
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/reports' %}active{% endif %}"
                           href="/reports">
                            <i class="bi bi-bar-chart-line me-1"></i>Report
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/sync-status' %}active{% endif %}"
                           href="/sync-status">
                            <i class="bi bi-arrow-repeat me-1"></i>Sync Status
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center">
                    <button class="theme-toggle text-body" id="themeToggle"
                            title="Cambia tema" aria-label="Cambia tema chiaro/scuro">
                        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-body-tertiary border-top py-2 mt-auto">
        <div class="container-fluid text-center">
            <small class="text-body-secondary">
                WeatherStation PWS &mdash; Dati da Weather Underground
            </small>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <!-- Theme toggle script -->
    <script>
        (function() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            const saved = localStorage.getItem('ws-theme') || 'light';

            html.setAttribute('data-bs-theme', saved);
            updateIcon(saved);

            document.getElementById('themeToggle').addEventListener('click', function() {
                const current = html.getAttribute('data-bs-theme');
                const next = current === 'light' ? 'dark' : 'light';
                html.setAttribute('data-bs-theme', next);
                localStorage.setItem('ws-theme', next);
                updateIcon(next);
            });

            function updateIcon(theme) {
                if (theme === 'dark') {
                    icon.className = 'bi bi-sun-fill';
                } else {
                    icon.className = 'bi bi-moon-stars-fill';
                }
            }
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
